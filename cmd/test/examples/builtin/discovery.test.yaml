# java + python apps live under sibling example dirs; builtin scans Python sources here.
providers:
  - name: builtin
    dataPath: ../python/test-data/python/
  - name: java
    dataPath: ../java/test-data/java/
  - name: python
    dataPath: ../python/test-data/python/
tests:
  - ruleID: language-discovery
    testCases:
    - name: tc-00
      hasTags:
      - Python
  - ruleID: kube-api-usage
    testCases:
    - name: tc-00
      description: kubernetes tag must be found
      hasTags:
      - Kubernetes
    - name: tc-01
      hasIncidents:
        exactly: 1
